<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Animation</title>
   <link rel="stylesheet" href="style.css">
   <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">  
</head>
<body>
    <canvas id=c></canvas>
<div class="controls">
        <h3>🎵 Musique</h3>
        <input type="file" id="audioFile" accept="audio/*">
        <button onclick="toggleAudio()">▶ Jouer/Pause</button>
        <button onclick="stopAudio()">⏹ Arrêter</button>
        <label>🔊 Volume:</label>
        <input type="range" id="volumeSlider" min="0" max="100" value="50">
    </div>
    <script src="script.js"></script>
</body>
</html>
